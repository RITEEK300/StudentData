<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro | Enterprise Management</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: {
                            50: '#f8fafc', 100: '#f1f5f9', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#0f172a'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#f8fafc] text-slate-900 font-sans min-h-screen flex flex-col lg:flex-row">

<aside class="lg:w-[380px] w-full bg-primary-900 text-white p-8 flex flex-col sticky top-0 lg:h-screen z-50 border-r border-slate-800">
    <div class="flex items-center gap-3 mb-12">
        <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
            <i class="fas fa-database text-lg"></i>
        </div>
        <h1 class="text-xl font-bold tracking-tight">NEXUS <span class="font-light opacity-70">CORE</span></h1>
    </div>

    <div class="mb-8">
        <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-[2px] mb-1">Management Portal</h2>
        <p class="text-sm text-slate-500">Add or update student records</p>
    </div>

    <form id="student-form" class="space-y-6">
        <input type="hidden" id="student-id">

        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-300">First Name</label>
                <input type="text" id="firstname" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary-600 focus:border-transparent outline-none transition-all placeholder:text-slate-600" placeholder="John" required>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-300">Last Name</label>
                <input type="text" id="lastname" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary-600 focus:border-transparent outline-none transition-all placeholder:text-slate-600" placeholder="Doe" required>
            </div>
        </div>

        <div class="space-y-2">
            <label class="text-xs font-semibold text-slate-300">Email Address</label>
            <input type="email" id="email" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary-600 focus:border-transparent outline-none transition-all placeholder:text-slate-600" placeholder="example@domain.com" required>
        </div>

        <div class="space-y-2">
            <label class="text-xs font-semibold text-slate-300">Contact Number</label>
            <input type="tel" id="phone" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary-600 focus:border-transparent outline-none transition-all placeholder:text-slate-600" placeholder="+91 00000 00000" required>
        </div>

        <div class="space-y-2">
            <label class="text-xs font-semibold text-slate-300">Performance Mark (%)</label>
            <input type="number" id="mark" step="0.1" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary-600 focus:border-transparent outline-none transition-all placeholder:text-slate-600" placeholder="0.0" required>
        </div>

        <div class="pt-4">
            <button type="submit" id="submit-btn" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-3 rounded-lg shadow-md transition-all flex items-center justify-center gap-2">
                <i class="fas fa-plus-circle"></i> Sync Record
            </button>
            <button type="button" id="cancel-btn" class="w-full mt-3 text-slate-500 hover:text-slate-300 text-xs font-medium transition-all hidden">Discard Changes</button>
        </div>
    </form>
</aside>

<main class="flex-1 p-6 lg:p-10">
    <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
        <div>
            <h2 class="text-2xl font-bold text-slate-900">Student Registry</h2>
            <div class="flex items-center gap-2 mt-1">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                <p class="text-sm text-slate-500 font-medium">Live Database Connection</p>
            </div>
        </div>
        <button onclick="fetchStudents()" class="bg-white border border-slate-200 text-slate-700 px-5 py-2.5 rounded-lg font-semibold text-sm shadow-sm hover:bg-slate-50 transition-all flex items-center gap-2">
            <i class="fas fa-sync-alt text-primary-600"></i> Refresh List
        </button>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Total Records</p>
                <h3 id="total-count" class="text-2xl font-bold text-slate-900 mt-1">0</h3>
            </div>
            <div class="p-3 bg-blue-50 text-primary-600 rounded-lg"><i class="fas fa-users"></i></div>
        </div>
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Passing Average</p>
                <h3 id="pass-rate" class="text-2xl font-bold text-emerald-600 mt-1">0%</h3>
            </div>
            <div class="p-3 bg-emerald-50 text-emerald-600 rounded-lg"><i class="fas fa-chart-line"></i></div>
        </div>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left" id="student-table">
                <thead>
                <tr class="bg-slate-50 border-b border-slate-200">
                    <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-wider">Student Name</th>
                    <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-wider">Contact</th>
                    <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-wider text-center">Mark</th>
                    <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-wider text-center">Status</th>
                    <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-wider text-right">Actions</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
    const API_BASE = '/api/students';

    async function fetchStudents() {
        try {
            const response = await fetch(API_BASE);
            const students = await response.json();
            updateStats(students);
            renderTable(students);
        } catch (err) { console.error("API Fetch Error", err); }
    }

    function updateStats(students) {
        document.getElementById('total-count').innerText = students.length;
        const passes = students.filter(s => s.mark >= 33).length;
        const rate = students.length ? Math.round((passes / students.length) * 100) : 0;
        document.getElementById('pass-rate').innerText = `${rate}%`;
    }

    function renderTable(students) {
        const tbody = document.querySelector('#student-table tbody');
        tbody.innerHTML = students.map(s => {
            const isPass = s.mark >= 33;
            return `
            <tr class="hover:bg-slate-50 transition-colors">
                <td class="px-6 py-4">
                    <div class="font-semibold text-slate-900">${s.firstname} ${s.lastname}</div>
                    <div class="text-[10px] text-slate-400 font-bold">UID: #${s.id}</div>
                </td>
                <td class="px-6 py-4">
                    <div class="text-sm font-medium text-slate-600">${s.email}</div>
                    <div class="text-xs text-slate-400">${s.phone}</div>
                </td>
                <td class="px-6 py-4 text-center">
                    <span class="text-sm font-bold ${isPass ? 'text-primary-600' : 'text-rose-600'}">${s.mark}%</span>
                </td>
                <td class="px-6 py-4 text-center">
                    <span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider ${isPass ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">
                        ${isPass ? 'Pass' : 'Fail'}
                    </span>
                </td>
                <td class="px-6 py-4 text-right space-x-2">
                    <button onclick='editRecord(${JSON.stringify(s)})' class="p-2 text-slate-400 hover:text-primary-600 transition-colors">
                        <i class="fas fa-edit text-xs"></i>
                    </button>
                    <button onclick="deleteRecord(${s.id})" class="p-2 text-slate-400 hover:text-rose-600 transition-colors">
                        <i class="fas fa-trash-alt text-xs"></i>
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    // --- Standard Backend Interaction ---
    document.getElementById('student-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('student-id').value;
        const payload = {
            firstname: document.getElementById('firstname').value,
            lastname: document.getElementById('lastname').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            mark: parseFloat(document.getElementById('mark').value)
        };
        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_BASE}/${id}` : API_BASE;

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) { resetForm(); fetchStudents(); }
        } catch (err) { alert("Error connecting to server"); }
    });

    async function deleteRecord(id) {
        if (!confirm("Are you sure you want to delete this record?")) return;
        try {
            const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
            if (res.ok) fetchStudents();
        } catch (err) { console.error(err); }
    }

    function editRecord(s) {
        document.getElementById('student-id').value = s.id;
        document.getElementById('firstname').value = s.firstname;
        document.getElementById('lastname').value = s.lastname;
        document.getElementById('email').value = s.email;
        document.getElementById('phone').value = s.phone;
        document.getElementById('mark').value = s.mark;
        document.getElementById('submit-btn').innerHTML = '<i class="fas fa-save me-2"></i> Update Record';
        document.getElementById('cancel-btn').classList.remove('hidden');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetForm() {
        document.getElementById('student-form').reset();
        document.getElementById('student-id').value = "";
        document.getElementById('submit-btn').innerHTML = '<i class="fas fa-plus-circle me-2"></i> Sync Record';
        document.getElementById('cancel-btn').classList.add('hidden');
    }

    document.getElementById('cancel-btn').onclick = resetForm;
    window.onload = fetchStudents;
</script>
</body>
</html>
