<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Core | AWS Cloud Registry</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        primary: { 600: '#2563eb', 700: '#1d4ed8', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-input {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 font-sans min-h-screen flex flex-col lg:flex-row overflow-x-hidden">

<aside class="lg:w-[420px] w-full bg-[#0b0e14] text-white p-6 lg:p-10 flex flex-col lg:sticky lg:top-0 lg:h-screen z-50 border-r border-slate-800 shadow-2xl overflow-y-auto custom-scrollbar">
    <div class="flex items-center gap-4 mb-12">
        <div class="w-12 h-12 bg-primary-600 rounded-2xl flex items-center justify-center rotate-3 shadow-xl shadow-blue-500/20">
            <i class="fas fa-database text-xl"></i>
        </div>
        <div>
            <h1 class="text-xl font-black tracking-tighter uppercase">Nexus <span class="text-blue-500 font-light">Core</span></h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-[3px] uppercase">AWS Managed</p>
        </div>
    </div>

    <form id="student-form" class="space-y-6">
        <input type="hidden" id="student-id">

        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">First Name</label>
                <input type="text" id="firstname" class="glass-input w-full rounded-xl px-4 py-3 text-sm text-white" placeholder="John" required>
            </div>
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">Last Name</label>
                <input type="text" id="lastname" class="glass-input w-full rounded-xl px-4 py-3 text-sm text-white" placeholder="Doe" required>
            </div>
        </div>

        <div class="space-y-2">
            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">Email Address</label>
            <input type="email" id="email" class="glass-input w-full rounded-xl px-4 py-3 text-sm text-white" placeholder="john@nexus.com" required>
        </div>

        <div class="space-y-2">
            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">Phone Number</label>
            <input type="tel" id="phone" class="glass-input w-full rounded-xl px-4 py-3 text-sm text-white" placeholder="+91 00000 00000" required>
        </div>

        <div class="space-y-2">
            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">Marks (%)</label>
            <input type="number" id="mark" step="0.1" class="glass-input w-full rounded-xl px-4 py-3 text-sm text-white" placeholder="00.0" required>
        </div>

        <div class="pt-6">
            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-900/30 transition-all flex items-center justify-center gap-3 active:scale-95">
                <i class="fas fa-cloud-upload-alt"></i> Add Data
            </button>
            <button type="button" id="cancel-btn" class="w-full mt-4 text-slate-500 hover:text-white text-xs font-black uppercase tracking-widest hidden">
                <i class="fas fa-times-circle mr-1"></i> Discard Edit
            </button>
        </div>
    </form>
</aside>

<main class="flex-1 p-5 lg:p-12 overflow-x-hidden">
    <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
        <div>
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">Active Registry</h2>
            <div class="flex items-center gap-2 mt-2">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <p class="text-[10px] text-slate-500 font-black uppercase tracking-[2px]">AWS Instance Live</p>
            </div>
        </div>
        <button onclick="fetchStudents()" class="bg-white border border-slate-200 text-slate-700 px-6 py-3 rounded-2xl font-bold text-xs shadow-sm hover:shadow-md transition-all flex items-center gap-3 justify-center group w-full md:w-auto">
            <i class="fas fa-sync-alt text-blue-600 group-hover:rotate-180 transition-transform duration-500"></i> Refresh Dataset
        </button>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 lg:gap-10 mb-10">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex items-center justify-between hover:border-blue-500 transition-colors">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Students</p>
                <h3 id="total-count" class="text-4xl font-black text-slate-900 mt-2">0</h3>
            </div>
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center text-2xl shadow-inner"><i class="fas fa-users"></i></div>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex items-center justify-between hover:border-emerald-500 transition-colors">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Global Pass %</p>
                <h3 id="pass-rate" class="text-4xl font-black text-emerald-600 mt-2">0%</h3>
            </div>
            <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-3xl flex items-center justify-center text-2xl shadow-inner"><i class="fas fa-chart-pie"></i></div>
        </div>
    </div>

    <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-2xl shadow-slate-200/40 overflow-hidden">
        <div class="overflow-x-auto no-scrollbar">
            <table class="w-full text-left min-w-[750px]" id="student-table">
                <thead class="bg-slate-50/50 border-b border-slate-100">
                <tr>
                    <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Student Identity</th>
                    <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Communication</th>
                    <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Score</th>
                    <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Outcome</th>
                    <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Actions</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
    // Vercel JSON handles the proxy to the
    const API_BASE = '/api/students';

    async function fetchStudents() {
        const tbody = document.querySelector('#student-table tbody');
        try {
            const response = await fetch(API_BASE);
            if (!response.ok) throw new Error();
            const students = await response.json();
            updateStats(students);
            renderTable(students);
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="5" class="py-20 text-center text-rose-500 font-bold">Error: Connection to AWS Instance Failed. Check CORS or AWS Port 8080.</td></tr>`;
        }
    }

    function updateStats(students) {
        document.getElementById('total-count').innerText = students.length;
        const passes = students.filter(s => s.mark >= 33).length;
        const rate = students.length ? Math.round((passes / students.length) * 100) : 0;
        document.getElementById('pass-rate').innerText = `${rate}%`;
    }

    function renderTable(students) {
        const tbody = document.querySelector('#student-table tbody');
        if (students.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="py-20 text-center text-slate-400 font-bold uppercase tracking-widest">Empty Registry</td></tr>`;
            return;
        }
        tbody.innerHTML = students.map(s => {
            const isPass = s.mark >= 33;
            return `
            <tr class="hover:bg-slate-50/80 transition-all group">
                <td class="px-8 py-6">
                    <div class="font-bold text-slate-900 text-base">${s.firstname} ${s.lastname}</div>
                    <div class="text-[10px] text-slate-400 font-black tracking-widest mt-1">ID: #SYS-${s.id}</div>
                </td>
                <td class="px-8 py-6">
                    <div class="text-sm font-semibold text-slate-700">${s.email}</div>
                    <div class="text-xs text-slate-400 font-medium">${s.phone}</div>
                </td>
                <td class="px-8 py-6 text-center">
                    <span class="text-base font-black ${isPass ? 'text-blue-600' : 'text-rose-600'}">${s.mark}%</span>
                </td>
                <td class="px-8 py-6 text-center">
                    <span class="px-4 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest ${isPass ? 'bg-emerald-100 text-emerald-700 shadow-sm' : 'bg-rose-100 text-rose-700 shadow-sm'}">
                        ${isPass ? 'Validated' : 'Deficit'}
                    </span>
                </td>
                <td class="px-8 py-6 text-right">
                    <div class="flex justify-end gap-2">
                        <button onclick='editRecord(${JSON.stringify(s)})' class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-400 hover:bg-blue-600 hover:text-white transition-all shadow-sm"><i class="fas fa-edit text-xs"></i></button>
                        <button onclick="deleteRecord(${s.id})" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-400 hover:bg-rose-600 hover:text-white transition-all shadow-sm"><i class="fas fa-trash-alt text-xs"></i></button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    document.getElementById('student-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('student-id').value;
        const payload = {
            firstname: document.getElementById('firstname').value,
            lastname: document.getElementById('lastname').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            mark: parseFloat(document.getElementById('mark').value)
        };

        try {
            const res = await fetch(id ? `${API_BASE}/${id}` : API_BASE, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) { resetForm(); fetchStudents(); }
        } catch (err) { alert("AWS Sync Failed!"); }
    });

    async function deleteRecord(id) {
        if (!confirm("Delete record from AWS permanently?")) return;
        await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
        fetchStudents();
    }

    function editRecord(s) {
        document.getElementById('student-id').value = s.id;
        document.getElementById('firstname').value = s.firstname;
        document.getElementById('lastname').value = s.lastname;
        document.getElementById('email').value = s.email;
        document.getElementById('phone').value = s.phone;
        document.getElementById('mark').value = s.mark;
        document.getElementById('submit-btn').innerHTML = '<i class="fas fa-check-circle"></i> Update Cloud Record';
        document.getElementById('cancel-btn').classList.remove('hidden');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetForm() {
        document.getElementById('student-form').reset();
        document.getElementById('student-id').value = "";
        document.getElementById('submit-btn').innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Sync to Cloud';
        document.getElementById('cancel-btn').classList.add('hidden');
    }

    document.getElementById('cancel-btn').onclick = resetForm;
    window.onload = fetchStudents;
</script>
</body>
</html>
